<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué personaje de EDEL eres?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:      #0b0b0f;
  --surface: #101016;
  --border:  #1c1c28;
  --text:    #edeaf4;
  --muted:   #56536a;
  --accent:  #c8a35e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1.25rem 5rem;
}

.wrap {
  width: 100%;
  max-width: 620px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ── */
.header {
  width: 100%;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2.5rem;
  margin-bottom: 3rem;
}
.header-eyebrow {
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.25rem;
  display: block;
  font-weight: 400;
}
h1 {
  font-family: 'Bitter', serif;
  font-size: clamp(2rem, 7vw, 3.2rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.02em;
  margin-bottom: .9rem;
}
h1 em { font-style: italic; color: var(--accent); }
.subtitle {
  font-size: .875rem;
  color: var(--muted);
  line-height: 1.55;
  font-weight: 300;
}

/* ── PROGRESS ── */
.progress-wrap { width: 100%; margin-bottom: 2.5rem; }
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: .7rem;
  color: var(--muted);
  letter-spacing: .05em;
  margin-bottom: .6rem;
  font-weight: 300;
}
.progress-bar { height: 1px; background: var(--border); }
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .4s ease;
  width: 0%;
}

/* ── QUESTION CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  width: 100%;
  padding: 2.5rem 2rem;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-number {
  font-size: .6rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1rem;
  font-weight: 400;
}
.q-text {
  font-family: 'Bitter', serif;
  font-size: 1.15rem;
  line-height: 1.45;
  margin-bottom: 2rem;
  font-style: italic;
}
.options { display: flex; flex-direction: column; gap: .5rem; }
.option {
  background: transparent;
  border: 1px solid var(--border);
  padding: .9rem 1.1rem;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  line-height: 1.45;
  font-weight: 300;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s, background .15s;
  width: 100%;
}
.option:hover  { border-color: var(--accent); background: rgba(200,163,94,.05); }
.option.selected { border-color: var(--accent); background: rgba(200,163,94,.08); }

/* ── RESULT ── */
.result-card { width: 100%; animation: fadeUp .4s ease; }
.result-eyebrow {
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
  display: block;
  font-weight: 400;
}
.result-img-wrap {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
}
.result-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
}
.result-img-wrap .emoji-ph { font-size: 5rem; opacity: .3; }
.result-meta {
  border: 1px solid var(--border);
  border-top: none;
  padding: 1.75rem 2rem 2rem;
  background: var(--surface);
}
.result-power {
  font-size: .6rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .6rem;
  font-weight: 400;
}
.result-name {
  font-family: 'Bitter', serif;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -.02em;
  margin-bottom: 1.5rem;
}
.result-desc {
  font-size: .875rem;
  color: #9e9ab0;
  line-height: 1.7;
  font-weight: 300;
}
.result-desc p + p { margin-top: .75rem; }

/* ── BUTTONS ── */
.btn-row {
  display: flex;
  gap: .75rem;
  margin-top: 1.75rem;
  flex-wrap: wrap;
}
.btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .7rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: .8rem 1.6rem;
  cursor: pointer;
  transition: border-color .2s, color .2s;
  font-weight: 400;
  flex: 1;
  min-width: 160px;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary {
  border-color: var(--accent);
  color: var(--accent);
}
.btn.primary:hover { background: var(--accent); color: var(--bg); }

/* ── AFFINITY SCREEN ── */
.affinity-screen { width: 100%; animation: fadeUp .4s ease; }
.affinity-header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.75rem;
  margin-bottom: 2rem;
}
.affinity-eyebrow {
  font-size: .65rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .75rem;
  display: block;
  font-weight: 400;
}
.affinity-title {
  font-family: 'Bitter', serif;
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -.01em;
}

/* Grid de afinidad: 2 cols dentro del wrap de 620px */
.affinity-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  margin-bottom: 1.75rem;
}
.aff-card {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  position: relative;
  transition: background .2s;
}
.aff-card:hover { background: var(--surface); }
.aff-card.winner { background: var(--surface); }

.aff-img {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  background: var(--surface);
}
.aff-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  filter: grayscale(20%);
  transition: filter .3s;
}
.aff-card.winner .aff-img img,
.aff-card:hover .aff-img img { filter: grayscale(0%); }

.aff-emoji-ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  opacity: .25;
}

.aff-body { padding: .85rem .9rem 1rem; }
.aff-pct {
  font-family: 'Bitter', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: .35rem;
}
.aff-card.winner .aff-pct { font-size: 1.6rem; }
.aff-name {
  font-family: 'Bitter', serif;
  font-size: .85rem;
  font-weight: 700;
  margin-bottom: .2rem;
  line-height: 1.2;
}
.aff-power {
  font-size: .58rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 400;
}
.aff-bar-wrap {
  height: 2px;
  background: var(--border);
  margin-top: .6rem;
}
.aff-bar {
  height: 100%;
  background: var(--accent);
  transition: width 1s ease;
  width: 0%;
}
.aff-bar-neg { background: var(--muted); opacity: .45; }

.aff-label {
  font-size: .6rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: .3rem;
}
.aff-card.negative .aff-label { color: var(--muted); }
.aff-pct-neg { color: var(--muted) !important; font-size: 1.1rem !important; }
.aff-card.negative { opacity: .7; }
.aff-card.negative .aff-img img { filter: grayscale(55%); }

.winner-badge {
  position: absolute;
  top: .6rem;
  right: .6rem;
  font-size: .55rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  background: var(--accent);
  color: var(--bg);
  padding: .25rem .5rem;
  font-weight: 500;
}

@media (max-width: 480px) {
  body { padding: 2rem 1rem 4rem; }
  .card { padding: 1.75rem 1.25rem; }
  .result-meta { padding: 1.25rem 1.25rem 1.5rem; }
  .btn-row { flex-direction: column; }
  .btn { min-width: unset; flex: unset; width: 100%; }
  .affinity-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

</div>

  Luna: { name:"Luna Ramírez", power:"Modificación de Recuerdos", emoji:"🌙", desc:["Proyectas autoridad y control. Sabes tomar decisiones difíciles aunque duelan, porque entiendes que la organización importa más que el confort. Por fuera, frialdad calculada. Por dentro, más de lo que nadie imagina.","Amas con intensidad a quienes son tuyos, pero lo proteges detrás de una distancia estratégica. Tu mayor conflicto: que proteger y controlar a veces se confunden."] },
  Frey: { name:"Frey Solaris", power:"Portales Dimensionales", emoji:"🌀", desc:["Llevas a las espaldas una historia que no le cuentas a nadie entero. Pesimista funcional: siempre tienes preparada la retirada, siempre has estudiado el terreno antes de que nadie lo pida.","Tienes la habilidad de aparecer justo cuando alguien te necesita. Y la de desaparecer cuando crees que sobras — aunque no sea verdad."] },
  Lydia: { name:"Lydia Navarro", power:"Guardiana — Curación y Transferencia", emoji:"🌿", desc:["Cuando alguien está mal, tú ya estás ahí. No esperas a que te pidan ayuda. Tu instinto protector es feroz y no admite negociación: sostienes la vida de otra persona durante horas a costa de la tuya propia sin reparar en el coste.","Tu mayor reto es aprender dónde terminas tú y dónde empieza la responsabilidad de otros — y no tenerle miedo a lo que proyectas cuando dejas de contenerte."] },
  Estrella: { name:"Estrella", power:"Gravedad — Co-líder de Astraea", emoji:"⭐", desc:["Llevas tiempo en esto. El suficiente para saber que la calma no es debilidad, sino la herramienta más poderosa que existe. Eres de las que ven el todo antes de actuar, y cuando actúas, lo haces con una precisión que no deja margen al error.","Has protegido a personas sin que supieran que lo hacías. Y sigues siendo el ancla de equilibrio para quienes te rodean."] },
  Leo: { name:"Leo", power:"Probabilidades", emoji:"🎲", desc:["Tienes una energía natural que hace que la gente quiera estar cerca de ti, aunque no sepan exactamente por qué. Pícaro, extrovertido, con ese punto de imprevisibilidad que convierte cada conversación en algo más interesante.","Pero debajo del encanto hay una mente que siempre está calculando. El mundo te funciona mejor cuando ya has visto los posibles resultados antes de tirarte al vacío."] },
  Grace: { name:"Grace Moreau", power:"Visión de Frecuencias", emoji:"👁️", desc:["Organizada, al mando, capaz de auto-cuestionarte cuando algo sale mal. Todos acuden a ti cuando tienen un problema porque sabes dar las mejores soluciones sin perder la cabeza.","Perder el control te cuesta muy caro — lo sabes por experiencia. Por eso tu exterior es tan calmado: no es frialdad, es autoprotección perfectamente calibrada."] },
  Noa: { name:"Noa", power:"Percepción Dimensional", emoji:"🔴", desc:["Percibes cosas de otros mundos que el resto no puede ver, oler ni escuchar — eso te ha hecho diferente desde siempre, y diferente no siempre fue sinónimo de bienvenido.","Pero confías en quien se lo ha ganado, y cuando lo haces, lo haces del todo. En los momentos límite, tu ayuda resulta ser la más decisiva de todas."] },
  Ona: { name:"Ona", power:"Cambiaformas y Telequinesis", emoji:"🦋", desc:["Fascinante e impredecible, y lo sabes. Puedes ser cualquiera que necesites ser, literal y figuradamente. Tu inteligencia es aguda y tu sentido del juego convierte las situaciones de tensión en algo casi divertido para ti.","No eres la villana de la historia, pero tampoco te esfuerzas en que nadie lo olvide. El caos controlado es tu terreno natural."] },
  Saphire: { name:"Saphire", power:"Voz Sónica", emoji:"🎙️", desc:["Tu voz tiene un peso que la mayoría no entiende hasta que es demasiado tarde. Por fuera eres cercana, casi juguetona — la misma persona que propone hacer urbex a medianoche y la que se queda cubriendo la retirada sin decir ni media queja.","Obedeces la jerarquía no porque te falte criterio, sino porque has aprendido que algunas batallas no se ganan de frente. Cuando hay que actuar, actúas antes que nadie."] },
  Xavier: { name:"Xavier Moreau", power:"Poder no revelado — Líder de Crimson", emoji:"♠️", desc:["Tienes una forma de entrar en una habitación que hace que todos se pregunten de qué lado estás. La respuesta, casi siempre, es del tuyo. Encantador, teatral en los márgenes, pero tremendamente observador cuando algo te importa.","Lideras Crimson desde la distancia estratégica y el calor selectivo. No eres el enemigo, pero tampoco te esfuerzas en que nadie lo descarte del todo."] },
  Aurora: { name:"Aurora", power:"Feromonas", emoji:"🌸", desc:["Tienes un encanto que la mayoría nota antes de poder explicar por qué. Teatral y afilado a partes iguales, sabes exactamente qué efecto produces en los demás — y eso te da una ventaja que no siempre usas bien.","La línea entre seducir y controlar es más fina de lo que reconoces. Tu mayor reto es aprender a distinguir cuándo actúas desde el deseo real y cuándo desde el miedo a perder."] },
  Dani: { name:"Dani", power:"Poder no revelado", emoji:"🃏", desc:["Tienes una capacidad natural para adaptarte a lo que el momento pide. No haces mucho ruido, pero siempre estás donde hace falta — y cuando el ambiente se complica, sabes mantener la cabeza fría sin perder el hilo.","Cargas con malentendidos del pasado que nunca tuviste la oportunidad de aclarar del todo. Lo que otros percibieron como traición fue a menudo circunstancia — y eso te ha enseñado que la verdad completa casi nunca llega a tiempo."] },
  Lucas: { name:"Lucas", power:"Poder no revelado", emoji:"☕", desc:["A primera vista eres la persona más accesible del grupo: cordial, curioso, sin aristas visibles. Te presentas con facilidad, preguntas qué estudia la gente, te integras sin esfuerzo aparente.","Pero hay capas que todavía nadie ha visto del todo. Lo que parece transparencia podría ser otra forma de pasar desapercibido — y lo que ocurre a tu alrededor cuando nadie presta demasiada atención es, curiosamente, más de lo que parece."] },
};

const maxPossible = {};
Object.keys(characters).forEach(k => maxPossible[k] = 0);
questions.forEach(q => q.options.forEach(o => {
  (o.add || []).forEach(c => { if (maxPossible[c] !== undefined) maxPossible[c]++; });
}));

let current = 0;
const scores = {};
Object.keys(characters).forEach(k => scores[k] = 0);

function affinityLabel(pct) {
  if (pct >= 85)  return "Alma gemela ✨";
  if (pct >= 70)  return "Mejor amigo/a";
  if (pct >= 57)  return "Confidente";
  if (pct >= 44)  return "Compañero/a de misión";
  if (pct >= 32)  return "Aliado/a";
  if (pct >= 20)  return "Conocido/a de la residencia";
  if (pct >= 10)  return "Compañero/a de clase";
  if (pct >= 4)   return "Nos hemos saludado en el pasillo";
  if (pct >= 1)   return "Me suena tu cara";
  if (pct === 0)  return "¿Nos conocemos?";
  if (pct >= -18) return "Energías que chocan";
  if (pct >= -35) return "Vendetta pendiente";
  return "Lados opuestos";
}

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progressLabel').textContent = 'Pregunta ' + (current + 1) + ' de ' + questions.length;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  const area = document.getElementById('quizArea');
  const card = document.createElement('div');
  card.className = 'card';
  const qNum = document.createElement('div'); qNum.className = 'q-number';
  qNum.textContent = '— ' + String(current + 1).padStart(2,'0') + ' / ' + questions.length;
  const qText = document.createElement('div'); qText.className = 'q-text';
  qText.textContent = q.text;
  const opts = document.createElement('div'); opts.className = 'options';
  q.options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = o.text;
    btn.onclick = () => pick(o, btn, opts);
    opts.appendChild(btn);
  });
  card.appendChild(qNum); card.appendChild(qText); card.appendChild(opts);
  area.innerHTML = '';
  area.appendChild(card);
  document.getElementById('progressWrap').style.display = '';
}

function pick(option, btn, opts) {
  opts.querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  (option.add || []).forEach(c => { if (scores[c] !== undefined) scores[c]++; });
  (option.sub || []).forEach(c => { if (scores[c] !== undefined) scores[c]--; });
  setTimeout(() => {
    current++;
    if (current < questions.length) renderQuestion();
    else showResult();
  }, 320);
}

function showResult() {
  document.getElementById('progressWrap').style.display = 'none';
  const winner = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
  const ch = characters[winner];
  const imgSrc = window.__edel_images && window.__edel_images[winner];

  const area = document.getElementById('quizArea');
  const el = document.createElement('div');
  el.className = 'result-card';

  const imgWrap = document.createElement('div'); imgWrap.className = 'result-img-wrap';
  if (imgSrc) { const img = document.createElement('img'); img.src = imgSrc; img.alt = ch.name; imgWrap.appendChild(img); }
  else { const ph = document.createElement('span'); ph.className = 'emoji-ph'; ph.textContent = ch.emoji; imgWrap.appendChild(ph); }

  const eyebrow = document.createElement('span'); eyebrow.className = 'result-eyebrow'; eyebrow.textContent = 'Tu personaje es';
  const meta = document.createElement('div'); meta.className = 'result-meta';
  const power = document.createElement('div'); power.className = 'result-power'; power.textContent = ch.power;
  const name = document.createElement('div'); name.className = 'result-name'; name.textContent = ch.name;
  const desc = document.createElement('div'); desc.className = 'result-desc';
  ch.desc.forEach(p => { const para = document.createElement('p'); para.textContent = p; desc.appendChild(para); });
  const btnRow = document.createElement('div'); btnRow.className = 'btn-row';
  const btnAff = document.createElement('button'); btnAff.className = 'btn primary';
  btnAff.textContent = 'Ver afinidad con todos →';
  btnAff.onclick = () => showAffinity(winner);
  const btnRetry = document.createElement('button'); btnRetry.className = 'btn';
  btnRetry.textContent = 'Volver a empezar';
  btnRetry.onclick = restart;
  btnRow.appendChild(btnAff); btnRow.appendChild(btnRetry);
  meta.appendChild(power); meta.appendChild(name); meta.appendChild(desc); meta.appendChild(btnRow);
  el.appendChild(eyebrow); el.appendChild(imgWrap); el.appendChild(meta);
  area.innerHTML = '';
  area.appendChild(el);
}

function showAffinity(winner) {
  const sorted = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
  const area = document.getElementById('quizArea');
  const el = document.createElement('div'); el.className = 'affinity-screen';

  const header = document.createElement('div'); header.className = 'affinity-header';
  const eyebrow = document.createElement('span'); eyebrow.className = 'affinity-eyebrow'; eyebrow.textContent = 'Afinidad completa';
  const title = document.createElement('div'); title.className = 'affinity-title'; title.textContent = 'Tu conexión con cada personaje';
  header.appendChild(eyebrow); header.appendChild(title);

  const grid = document.createElement('div'); grid.className = 'affinity-grid';

  sorted.forEach(key => {
    const ch = characters[key];
    const mp = maxPossible[key] || 1;
    const pct = Math.round((scores[key] / mp) * 100);
    const label = affinityLabel(pct);
    const isWinner = key === winner;
    const isNeg = pct < 0;
    const barW = Math.max(0, Math.min(100, pct));
    const imgSrc = window.__edel_images && window.__edel_images[key];

    const card = document.createElement('div');
    card.className = 'aff-card' + (isWinner ? ' winner' : '') + (isNeg ? ' negative' : '');

    if (isWinner) {
      const badge = document.createElement('div'); badge.className = 'winner-badge';
      badge.textContent = 'Tu resultado'; card.appendChild(badge);
    }

    const imgDiv = document.createElement('div'); imgDiv.className = 'aff-img';
    if (imgSrc) { const img = document.createElement('img'); img.src = imgSrc; img.alt = ch.name; imgDiv.appendChild(img); }
    else { const ph = document.createElement('div'); ph.className = 'aff-emoji-ph'; ph.textContent = ch.emoji; imgDiv.appendChild(ph); }

    const body = document.createElement('div'); body.className = 'aff-body';
    const pctEl = document.createElement('div'); pctEl.className = 'aff-pct' + (isNeg ? ' aff-pct-neg' : '');
    pctEl.textContent = pct + '%';
    const labelEl = document.createElement('div'); labelEl.className = 'aff-label'; labelEl.textContent = label;
    const nameEl = document.createElement('div'); nameEl.className = 'aff-name'; nameEl.textContent = ch.name;
    const powerEl = document.createElement('div'); powerEl.className = 'aff-power'; powerEl.textContent = ch.power;
    const barWrap = document.createElement('div'); barWrap.className = 'aff-bar-wrap';
    const bar = document.createElement('div'); bar.className = 'aff-bar' + (isNeg ? ' aff-bar-neg' : '');
    bar.dataset.w = barW;
    barWrap.appendChild(bar);
    body.appendChild(pctEl); body.appendChild(labelEl); body.appendChild(nameEl); body.appendChild(powerEl); body.appendChild(barWrap);
    card.appendChild(imgDiv); card.appendChild(body);
    grid.appendChild(card);
  });

  const retryBtn = document.createElement('button'); retryBtn.className = 'btn';
  retryBtn.style.cssText = 'width:100%;justify-content:center;margin-top:1rem';
  retryBtn.textContent = 'Volver a empezar'; retryBtn.onclick = restart;

  el.appendChild(header); el.appendChild(grid); el.appendChild(retryBtn);
  area.innerHTML = '';
  area.appendChild(el);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    grid.querySelectorAll('.aff-bar').forEach(bar => { bar.style.width = bar.dataset.w + '%'; });
  }));
}

function restart() {
  current = 0;
  Object.keys(scores).forEach(k => scores[k] = 0);
  renderQuestion();
  document.getElementById('progressWrap').style.display = '';
}

renderQuestion();
</script>
</body>
</html>
