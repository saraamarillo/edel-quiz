<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDEL — Los Personajes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg:      #0b0b0f;
  --surface: #101016;
  --border:  #1c1c28;
  --text:    #edeaf4;
  --muted:   #56536a;
  --accent:  #c8a35e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  /* prevent horizontal overflow on mobile */
  overflow-x: hidden;
}

/* ── HERO ── */
.hero {
  max-width: 900px;
  margin: 0 auto;
  padding: 5rem 2rem 3.5rem;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-size: .68rem;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1.5rem;
  display: block;
  font-weight: 400;
}

h1 {
  font-family: 'Bitter', serif;
  font-size: clamp(2.6rem, 10vw, 6rem);
  font-weight: 700;
  line-height: .95;
  letter-spacing: -.025em;
  margin-bottom: 1.5rem;
}

h1 em { font-style: italic; color: var(--accent); }

.hero-sub {
  font-size: clamp(.875rem, 2.5vw, 1rem);
  color: var(--muted);
  line-height: 1.6;
  font-weight: 300;
  max-width: 380px;
}

/* ── SECTION / GRID ── */
.section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0;
}

/* Grid: full-bleed newspaper style, 4 cols desktop */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  /* top border acts as divider from hero */
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

/* ── CARD ── */
.card {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  transition: background .2s;
}
.card:hover { background: var(--surface); }

.card-img {
  width: 100%;
  aspect-ratio: 1 / 1;
  overflow: hidden;
  background: var(--surface);
}
.card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center center;
  display: block;
  transition: transform .4s ease;
}
.card:hover .card-img img { transform: scale(1.04); }

.card-img .placeholder {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: .5rem;
}
.card-img .placeholder .emoji { font-size: 2.5rem; opacity: .35; }
.card-img .placeholder .soon {
  font-size: .58rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: .5;
}

.card-body {
  padding: .9rem 1rem 1.2rem;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex: 1;
}

.card-power {
  font-size: .58rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: .45rem;
  font-weight: 400;
  /* prevent overflow on narrow cards */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-name {
  font-family: 'Bitter', serif;
  font-size: clamp(.95rem, 1.8vw, 1.15rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: .6rem;
}

.card-desc {
  font-size: clamp(.72rem, 1.4vw, .8rem);
  color: #9e9ab0;
  line-height: 1.6;
  font-weight: 300;
  /* hide on very narrow cards to keep layout clean */
}
.card-desc p + p { margin-top: .4rem; }

/* ── CTA ── */
.cta {
  max-width: 900px;
  margin: 0 auto;
  padding: 3.5rem 2rem 5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 2rem;
  flex-wrap: wrap;
}

.cta-text {
  font-family: 'Bitter', serif;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  font-style: italic;
  color: var(--muted);
  font-weight: 400;
  flex: 1;
  min-width: 200px;
}

.btn {
  display: inline-block;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  padding: .9rem 2rem;
  text-decoration: none;
  transition: background .2s, color .2s;
  white-space: nowrap;
  /* bigger touch target on mobile */
  min-height: 44px;
  display: flex;
  align-items: center;
}
.btn:hover { background: var(--accent); color: var(--bg); }

/* ═══════════════════════════
   RESPONSIVE BREAKPOINTS
   ═══════════════════════════ */

/* Tablet: 3 cols */
@media (max-width: 960px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}

/* Large mobile: 2 cols, tighter hero */
@media (max-width: 640px) {
  .hero {
    padding: 3rem 1.25rem 2.5rem;
  }
  .hero-sub { max-width: 100%; }

  .grid { grid-template-columns: repeat(2, 1fr); }

  .card-body { padding: .75rem .8rem 1rem; }

  /* On 2-col mobile, desc gets very cramped — show only first paragraph */
  .card-desc p:last-child { display: none; }

  .cta {
    padding: 2.5rem 1.25rem 3.5rem;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.25rem;
  }
  .cta-text { min-width: unset; }
  .btn { width: 100%; justify-content: center; }
}

/* Small mobile: still 2 cols but even tighter */
@media (max-width: 400px) {
  h1 { letter-spacing: -.03em; }
  .card-body { padding: .6rem .65rem .85rem; }
  .card-power { display: none; } /* too cramped, remove power label */
  .card-name { font-size: .9rem; }
  .card-desc { display: none; } /* hide desc entirely at very small, image+name only */
}
</style>
</head>
<body>

<div class="hero">
  <span class="hero-eyebrow">Universidad Somnia &middot; Guadalajara</span>
  <h1>Los personajes<br>de <em>EDEL</em></h1>
  <p class="hero-sub">Catorce personas. Una campa&ntilde;a que existe entre el desvelo y el sue&ntilde;o latente.</p>
</div>

<div class="section">
  <div class="grid" id="grid"></div>
</div>

<div class="cta">

</div>

   desc:["Tienes la mirada de alguien que analiza antes de actuar. Elegante sin proponértelo, precisa sin ser fría. Llevas una cámara mental que nunca para de grabar: detalles, patrones, cosas que los demás dejan escapar.","Cuando algo te importa, lo defiendes con una firmeza que sorprende a quien no te conoce. Y cuando alguien necesita que alguien salte, eres tú quien salta primero."]},
  {key:"Maven",name:"Maven",power:"Tecnología Anómala",emoji:"🎵",
   desc:["Usas el sarcasmo como escudo y como espada, según el momento. Práctica hasta el extremo: analizas, documentas, actúas — incluso en plena huida. Tu sentido del humor funciona como mecanismo de supervivencia, pero debajo de la ironía hay alguien que se preocupa profundamente.","Solo que no lo anuncia."]},
  {key:"Ethan",name:"Ethan",power:"Escudo de Diamante",emoji:"🛡️",
   desc:["Llevas el liderazgo de forma natural, aunque a veces te pese. Eres de los que se ponen delante cuando hay peligro — directo, protector, con un punto de brusquedad que viene de no tener tiempo para rodeos.","Tu fidelidad a quienes consideras tuyos es absoluta. Ni de coña dejas a nadie atrás."]},
  {key:"Ryan",name:"Ryan",power:"Humo Tóxico",emoji:"🌫️",
   desc:["Eres de pocas palabras y muchas capas. La gente no suele saber qué estás pensando, y en parte eso es intencional. Cargas con un pasado que prefieres no abrir delante de nadie.","Tu lealtad no se anuncia: se demuestra con acciones discretas que los demás no siempre notan a tiempo. Eres más de proteger que de destacar. Y eso dice mucho."]},
  {key:"Luna",name:"Luna Ramírez",power:"Modificación de Recuerdos",emoji:"🌙",
   desc:["Proyectas autoridad y control. Sabes tomar decisiones difíciles aunque duelan, porque entiendes que la organización importa más que el confort. Por fuera, frialdad calculada. Por dentro, más de lo que nadie imagina.","Amas con intensidad a quienes son tuyos, pero lo proteges detrás de una distancia estratégica. Tu mayor conflicto: que proteger y controlar a veces se confunden."]},
  {key:"Frey",name:"Frey",power:"Portales Dimensionales",emoji:"🌀",
   desc:["Llevas a las espaldas una historia que no le cuentas a nadie entero. Pesimista funcional: siempre tienes preparada la retirada, siempre has estudiado el terreno antes de que nadie lo pida.","Tienes la habilidad de aparecer justo cuando alguien te necesita. Y la de desaparecer cuando crees que sobras, aunque no sea verdad."]},
  {key:"Lydia",name:"Lydia Royal",power:"Guardiana — Curación y Transferencia",emoji:"🌿",
   desc:["Cuando alguien está mal, tú ya estás ahí. No esperas a que te pidan ayuda. Tu instinto protector es feroz y no admite negociación: sostienes la vida de otra persona durante horas a costa de la tuya propia sin reparar en el coste.","Tu mayor reto es aprender dónde terminas tú y dónde empieza la responsabilidad de otros."]},
  {key:"Estrella",name:"Estrella",power:"Gravedad",emoji:"⭐",
   desc:["Llevas tiempo en esto. El suficiente para saber que la calma no es debilidad, sino la herramienta más poderosa que existe. Eres de las que ven el todo antes de actuar, y cuando actúas, lo haces con una precisión que no deja margen al error.","Has protegido a personas sin que supieran que lo hacías. Eso te define más que cualquier título."]},
  {key:"Leo",name:"Leo",power:"Probabilidades",emoji:"🎲",
   desc:["Tienes una energía natural que hace que la gente quiera estar cerca de ti, aunque no sepan exactamente por qué. Pícaro, extrovertido, con ese punto de imprevisibilidad que convierte cada conversación en algo más interesante.","Pero debajo del encanto hay una mente que siempre está calculando. El mundo te funciona mejor cuando ya has visto los posibles resultados antes de tirarte al vacío."]},
  {key:"Grace",name:"Grace",power:"Visión de Frecuencias",emoji:"👁️",
   desc:["Líder del departamento de inteligencia de Astraea: organizada, al mando, capaz de auto-cuestionarte cuando algo sale mal. Hay capas en ti que muy poca gente ha visto. Por fuera: competente, ágil, al control.","Tu poder es ver lo que los demás no pueden. Pero a veces lo más difícil es ver lo que tienes delante y decidir qué hacer con ello."]},
  {key:"Noa",name:"Noa",power:"Percepción Dimensional",emoji:"🔴",
   desc:["Apariencia de niño, carga de adulto. Percibes cosas de otros mundos que el resto no puede ver, oler ni escuchar — eso te ha hecho diferente desde siempre, y diferente no siempre fue sinónimo de bienvenido.","Pero confías en quien se lo ha ganado, y cuando lo haces, lo haces del todo. Eres más decisivo de lo que cualquiera que te subestime imagina."]},
  {key:"Ona",name:"Ona",power:"Cambiaformas y Telequinesis",emoji:"🦋",
   desc:["Fascinante e impredecible, y lo sabes. Puedes ser cualquiera que necesites ser, literal y figuradamente. Tu inteligencia es aguda y tu sentido del juego convierte las situaciones de tensión en algo casi divertido para ti.","No eres la villana de la historia, pero tampoco te esfuerzas en que nadie lo olvide. El caos controlado es tu terreno natural."]},
  {key:"Saphire",name:"Saphire",power:"Voz Sónica",emoji:"🎙️",
   desc:["Tu voz tiene un peso que la mayoría no entiende hasta que es demasiado tarde. Por fuera eres cercana, casi juguetona — la misma persona que propone hacer urbex a medianoche y la que se queda cubriendo la retirada sin decir ni media queja.","Obedeces la jerarquía no porque te falte criterio, sino porque has aprendido que algunas batallas no se ganan con información. Cuando hay que actuar, sin embargo, actúas antes que nadie."]},
  {key:"Xavier",name:"Xavier",power:"Poder no revelado — Líder de Crimson",emoji:"♠️",
   desc:["Tienes una forma de entrar en una habitación que hace que todos se pregunten de qué lado estás. La respuesta, casi siempre, es del tuyo. Encantador, teatral en los márgenes, pero tremendamente observador cuando algo te importa.","Lideras Crimson desde la distancia estratégica y el calor selectivo. No eres el enemigo, pero tampoco te esfuerzas en que nadie lo descarte del todo."]},
];

const grid=document.getElementById('grid');
characters.forEach(c=>{
  const imgSrc=window.__edel_images&&window.__edel_images[c.key];
  const card=document.createElement('div');card.className='card';
  const imgWrap=document.createElement('div');imgWrap.className='card-img';
  if(imgSrc){
    const img=document.createElement('img');img.src=imgSrc;img.alt=c.name;imgWrap.appendChild(img);
  } else {
    const ph=document.createElement('div');ph.className='placeholder';
    ph.innerHTML='<span class="emoji">'+c.emoji+'</span><span class="soon">próximamente</span>';
    imgWrap.appendChild(ph);
  }
  const body=document.createElement('div');body.className='card-body';
  const power=document.createElement('div');power.className='card-power';power.textContent=c.power;
  const name=document.createElement('div');name.className='card-name';name.textContent=c.name;
  const desc=document.createElement('div');desc.className='card-desc';
  desc.innerHTML=c.desc.map(p=>'<p>'+p+'</p>').join('');
  body.appendChild(power);body.appendChild(name);body.appendChild(desc);
  card.appendChild(imgWrap);card.appendChild(body);
  grid.appendChild(card);
});
</script>
